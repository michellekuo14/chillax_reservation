<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我要報名團練</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      animation: pop 0.3s ease;
      max-width: 90%;
    }

    .checkmark {
      font-size: 50px;
      color: #06c755;
      animation: scale 0.4s ease;
    }

    .success-text {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    @keyframes pop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes scale {
      from {
        transform: scale(0);
      }

      to {
        transform: scale(1);
      }
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      background: #f5f6f8;
    }

    .header {
      background: #06c755;
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      border: 2px solid transparent;
    }

    /* 👇 場次卡片預設邊框加粗 */
    #slots .card {
      border: 2px solid #ddd;
    }

    .slot-title {
      font-size: 16px;
      font-weight: 600;
    }

    .slot-info {
      font-size: 13px;
      color: #444;
      margin-top: 4px;
    }

    .slot-sub {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #06c755;
      color: white;
      font-size: 16px;
      margin-top: 10px;
    }

    .btn:disabled {
      background: #ccc;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .selected {
      border: 3px solid #06c755 !important;
    }

    .required {
      color: #e74c3c;
      margin-left: 2px;
    }

    .equip-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .equip-item {
      display: flex;
      align-items: center;
      padding: 8px;
      background: #f9f9f9;
      border-radius: 6px;
      font-size: 14px;
    }

    .equip-item input[type="checkbox"] {
      width: auto;
      margin: 0 10px 0 0;
    }

    .section-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* 👇 注意事項內容靠左 */
    .info-text-left {
      text-align: left;
    }

    /* 👇 自訂提示彈窗(取代 alert) */
    .alert-text {
      margin: 10px 0 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="header">📅 團練預約</div>

  <div class="container">
    <div class="card">
      <div class="section-title">團練場次<span class="required">*</span></div>
    </div>

    <div id="slots"></div>

    <div class="card">
      <div class="section-title">姓名/Line ID<span class="required">*</span></div>
      <input id="name" placeholder="請輸入姓名和Line ID" />
    </div>

    <div class="card">
      <div class="section-title">連絡電話<span class="required">*</span></div>
      <input id="phone" />
    </div>

    <div class="card">
      <div class="section-title">證照等級<span class="required">*</span></div>
      <input id="license" />
    </div>

    <div class="card">
      <div class="section-title">緊急聯絡人/電話<span class="required">*</span></div>
      <input id="emergency" />
    </div>

    <div class="card">
      <div class="section-title">付款方式<span class="required">*</span></div>
      <input id="payment" placeholder="匯款請填後五碼/Line Pay則寫Line Pay" />
    </div>

    <div class="card">
      <div class="section-title">發票/統編<span class="required">*</span></div>
      <input id="invoice" placeholder="請填載具號碼或統編" />
    </div>

    <div class="card">
      <div class="section-title">🤿 裝備租借資訊</div>
      <div class="equip-info" id="equipInfo">載入中...</div>
    </div>

    <div class="card">
      <div class="section-title">備註</div>
      <textarea id="note" placeholder="裝備需求等等"></textarea>
    </div>

    <button class="btn" onclick="submitBooking()">確認報名</button>

  </div>

  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="checkmark">✔</div>
      <div class="success-text">報名成功！</div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <div class="success-text">📢 注意事項</div>
      <div id="infoContent" class="info-text-left" style="margin-top:10px; font-size:14px; white-space:pre-line;"></div>
      <button class="btn" id="confirmInfoBtn" onclick="confirmInfo()">我已閱讀</button>
    </div>
  </div>

  <!-- 👇 自訂提示彈窗(取代 alert) -->
  <div id="alertModal" class="modal">
    <div class="modal-content">
      <div class="success-text" id="alertTitle">提示</div>
      <div class="alert-text" id="alertMessage"></div>
      <button class="btn" onclick="closeAlert()">確定</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyw7KenXXDbiT8-EMT355PN5iwvlIS2RNXPPVOHkOM-m42SpUc2afxNAe2UexsmVHOi/exec";
    const YOUR_LIFF_ID = "2009884041-ANvyV2S7";
    let userId = "";
    let selected = null;

    // 🔥 自訂提示彈窗(取代 alert,沒有網址列那行)
    function showAlert(message, title = "提示") {
      document.getElementById("alertTitle").innerText = title;
      document.getElementById("alertMessage").innerText = message;
      document.getElementById("alertModal").classList.add("show");
    }

    function closeAlert() {
      document.getElementById("alertModal").classList.remove("show");
    }

    window.onerror = function (msg, url, line) {
      showAlert("JS錯誤: " + msg + "\nline: " + line, "錯誤");
    };
    window.addEventListener("unhandledrejection", function (event) {
      showAlert("Promise錯誤: " + event.reason, "錯誤");
    });


    function showSuccess() {
      const modal = document.getElementById("successModal");
      modal.classList.add("show");

      setTimeout(() => {
        if (liff.isInClient()) {
          liff.closeWindow();
        } else {
          modal.classList.remove("show");
        }
      }, 1500);
    }

    async function loadInformation() {
      const btn = document.getElementById("confirmInfoBtn");
      try {
        const res = await fetch(`${GAS_URL}?action=getInformation`);
        const data = await res.json();

        document.getElementById("infoContent").innerText = data.content;
        btn.disabled = false;
        btn.innerText = "我已閱讀";

        // 🔥 順便填裝備清單
        const equipEl = document.getElementById("equipInfo");
        if (equipEl) {
          equipEl.innerText = data.equipments || "暫無裝備可租借";
        }
      } catch (err) {
        console.error(err);
        document.getElementById("infoContent").innerText = "❌ 載入失敗,請重新整理";
        const equipEl = document.getElementById("equipInfo");
        if (equipEl) equipEl.innerText = "❌ 載入失敗";
      }
    }

    function confirmInfo() {
      document.getElementById("infoModal").classList.remove("show");
    }

    async function init() {
      await liff.init({ liffId: YOUR_LIFF_ID });
      const profile = await liff.getProfile();
      userId = profile.userId;
    }

    let slotsPolling = null;  // 🔥 polling 計時器
    let isFirstLoad = true;   // 🔥 區分首次 vs 更新

    async function loadSlots() {
      const container = document.getElementById("slots");

      // 🔥 只有首次載入才顯示「載入中...」,後續刷新不閃爍
      if (isFirstLoad) {
        container.innerHTML = "載入中...";
      }

      try {
        // 🔥 加時間戳避免瀏覽器快取
        const res = await fetch(`${GAS_URL}?action=getSlots&t=${Date.now()}`);
        const data = await res.json();

        // 🔥 記住目前選中的場次,刷新後保留
        const selectedKey = selected ? `${selected.type}|${selected.slot}` : null;

        container.innerHTML = "";

        data.forEach((s, idx) => {
          const div = document.createElement("div");
          div.className = "card";

          const remaining = s.maxPeople - s.currentPeople;
          let statusText = remaining > 0 ? `剩餘:${remaining} 人` : `❌ 已額滿`;

          div.innerHTML = `
        <div class="slot-title">${s.type}</div>
        <div class="slot-info">📍 ${s.location || ""}</div>
        <div class="slot-info">🕒 ${s.slot}</div>
        <div class="slot-info">💰 ${s.price ? s.price + " 元" : ""}</div>
        <div class="slot-sub">${statusText}</div>
      `;

          if (remaining <= 0) {
            div.style.opacity = "0.5";
            div.style.pointerEvents = "none";
            // 🔥 如果原本選的場次滿了,清掉選擇
            if (selectedKey === `${s.type}|${s.slot}`) {
              selected = null;
              showAlert("您剛才選的場次已額滿,請重新選擇");
            }
          }

          // 🔥 還原選中狀態
          if (selectedKey === `${s.type}|${s.slot}` && remaining > 0) {
            div.classList.add("selected");
            selected = s;  // 更新 selected 物件(因為 currentPeople 變了)
          }

          div.onclick = () => {
            document.querySelectorAll("#slots .card").forEach(c => c.classList.remove("selected"));
            div.classList.add("selected");
            selected = s;
            console.log("選到:", selected);
          };

          container.appendChild(div);
        });

        isFirstLoad = false;
      } catch (err) {
        console.error(err);
        if (isFirstLoad) {
          document.getElementById("slots").innerHTML = "❌ 載入失敗";
        }
        // 🔥 後續刷新失敗就靜默,不要打擾使用者
      }
    }

    // 🔥 開始定時刷新(每 5 秒)
    function startPollingSlots() {
      if (slotsPolling) return;  // 避免重複
      slotsPolling = setInterval(loadSlots, 5000);
    }

    // 🔥 停止刷新
    function stopPollingSlots() {
      clearInterval(slotsPolling);
      slotsPolling = null;
    }

    // 🔥 切回頁面時立刻刷一次(B 方案)
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        loadSlots();
      }
    });


    async function submitBooking() {
      const btn = document.querySelector(".container > .btn");
      btn.disabled = true;
      btn.innerText = "處理中...";

      try {
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const license = document.getElementById("license").value.trim();
        const emergency = document.getElementById("emergency").value.trim();
        const payment = document.getElementById("payment").value;
        const invoice = document.getElementById("invoice").value.trim();
        const note = document.getElementById("note").value.trim();

        const requiredFields = [
          { val: name, label: "姓名" },
          { val: phone, label: "連絡電話" },
          { val: license, label: "證照等級" },
          { val: emergency, label: "緊急聯絡人/電話" },
          { val: payment, label: "付款方式" },
          { val: invoice, label: "發票/統編" }
        ];

        const missing = requiredFields.filter(f => !f.val).map(f => f.label);
        if (missing.length > 0) {
          showAlert("請填寫:" + missing.join("、"));
          return;
        }

        if (!selected) {
          showAlert("請選擇團練場次");
          return;
        }

        const payload = {
          action: "createBooking",
          userId,
          name,
          phone,
          license,
          emergency,
          payment,
          invoice,
          type: selected.type,
          slot: selected.slot,
          note
        };

        const query = new URLSearchParams(payload).toString();
        const url = `${GAS_URL}?${query}`;
        console.log("request url:", url);

        const res = await fetch(url);
        const result = await res.json();
        console.log("result:", result);

        if (result.success) {
          showSuccess();
        } else {
          showAlert(result.message || "報名失敗");
        }

      } catch (err) {
        console.error(err);
        showAlert("連線失敗:" + err);
      } finally {
        btn.innerText = "確認報名";
        btn.disabled = false;
      }
    }

    renderEquipList();

    // 立刻彈 modal
    document.getElementById("infoModal").classList.add("show");
    document.getElementById("infoContent").innerText = "載入中...";
    document.getElementById("confirmInfoBtn").disabled = true;

    init().catch(err => showAlert("LIFF init 失敗: " + err.message, "錯誤"));
    loadInformation();
    loadEquipments();
    loadSlots();
    startPollingSlots();   // 🔥 開啟定時刷新
  </script>

</body>

</html>
