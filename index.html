<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Booking System</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <h2>預約系統</h2>

  <div>
    <label>姓名：</label>
    <input id="name" />
  </div>

  <div>
    <label>人數：</label>
    <input id="people" type="number" value="1" />
  </div>

  <hr />

  <div id="slots"></div>

  <button onclick="submitBooking()">送出預約</button>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyw7KenXXDbiT8-EMT355PN5iwvlIS2RNXPPVOHkOM-m42SpUc2afxNAe2UexsmVHOi/exec";
let selected = null;
let userId = "";

async function init() {
  await liff.init({ liffId: "2009884041-ANvyV2S7" });

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadSlots();
}

async function loadSlots() {
  const res = await fetch(`${GAS_URL}?action=getSlots`);
  const data = await res.json();

  const container = document.getElementById("slots");
  container.innerHTML = "";

  data.forEach((s, index) => {
    const div = document.createElement("div");
    div.innerHTML = `
      <input type="radio" name="slot" value="${index}" />
      ${s.type} / ${s.slot}
      - 剩餘: ${s.remaining}
    `;

    div.querySelector("input").onclick = () => {
      selected = s;
    };

    container.appendChild(div);
  });
}

async function submitBooking() {
  const name = document.getElementById("name").value;
  const people = Number(document.getElementById("people").value);

  if (!selected) {
    alert("請選擇 slot");
    return;
  }

  const payload = {
    action: "createBooking",
    userId,
    name,
    type: selected.type,
    slot: selected.slot,
    people
  };

  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  });

  const result = await res.json();

  if (result.success) {
    alert("預約成功！");
    loadSlots();
  } else {
    alert(result.message);
  }
}

init();
</script>

</body>
</html>
