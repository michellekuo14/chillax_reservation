<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我要報名鬆鬆潛團練</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      background: #f5f6f8;
    }

    .header {
      background: #73af8c;
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }

    .container { padding: 16px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      border: 2px solid transparent;
    }

    #slots .card {
      border: 1px solid #e0e0e0;
      cursor: pointer;
    }

    #slots .card.selected {
      border: 3px solid #333 !important;
    }

    .slot-free    { background: rgba(231, 76, 60, 0.12) !important; }
    .slot-mermaid { background: rgba(217, 230, 34, 0.12) !important; }
    .slot-dance   { background: rgba(15, 241, 56, 0.18) !important; }
    .slot-scuba   { background: rgba(39, 82, 174, 0.12) !important; }

    .slot-title { font-size: 16px; font-weight: 600; }
    .slot-info { font-size: 13px; color: #444; margin-top: 4px; }
    .slot-status { font-size: 13px; color: #000; font-weight: 700; margin-top: 4px; }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #73af8c;
      color: white;
      font-size: 16px;
      margin-top: 10px;
    }
    .btn:disabled { background: #ccc; }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
    }
    textarea { resize: vertical; min-height: 60px; }

    .required { color: #e74c3c; margin-left: 2px; }
    .section-title { font-weight: 600; margin-bottom: 4px; }

    .equip-info {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 12px;
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-line;
    }

    .selected-summary {
      background: #f0fff5;
      border: 2px solid #06c755;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #06c755;
      font-weight: 600;
      text-align: center;
    }

    .modal {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .modal.show { display: flex; }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      animation: pop 0.3s ease;
      max-width: 90%;
    }

    .checkmark { font-size: 50px; color: #06c755; }
    .success-text { margin-top: 10px; font-size: 18px; font-weight: bold; }
    .alert-text { margin: 10px 0 20px; font-size: 15px; line-height: 1.6; color: #333; }
    .info-text-left { text-align: left; }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

  <div class="header">📅 鬆鬆潛團練預約</div>

  <div class="container">

    <div class="card">
      <div class="section-title">團練場次<span class="required">*</span></div>
      <div style="font-size:12px; color:#888; margin-top:4px;">可複選,點一下選取/取消</div>
    </div>

    <div id="slots"></div>
    <div id="selectedSummary" class="selected-summary" style="display:none;"></div>

    <div class="card">
      <div class="section-title">姓名/Line ID<span class="required">*</span></div>
      <input id="name" placeholder="請輸入姓名" />
    </div>

    <div class="card">
      <div class="section-title">連絡電話<span class="required">*</span></div>
      <input id="phone" />
    </div>

    <div class="card">
      <div class="section-title">證照等級<span class="required">*</span></div>
      <input id="license" />
    </div>

    <div class="card">
      <div class="section-title">緊急聯絡人/電話<span class="required">*</span></div>
      <input id="emergency" />
    </div>

    <div class="card">
      <div class="section-title">付款方式<span class="required">*</span></div>
      <input id="payment" placeholder="匯款請填後五碼/Linepay則填Linepay" />
    </div>

    <div class="card">
      <div class="section-title">發票/統編<span class="required">*</span></div>
      <input id="invoice" placeholder="不需要請填「無」" />
    </div>

    <div class="card">
      <div class="section-title">🤿 裝備租借資訊</div>
      <div class="equip-info" id="equipInfo">載入中...</div>
    </div>

    <div class="card">
      <div class="section-title">備註</div>
      <textarea id="note" placeholder="如需租借裝備、特殊需求等請填寫於此"></textarea>
    </div>

    <button class="btn" onclick="submitBooking()">確認報名</button>

  </div>

  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="checkmark">✔</div>
      <div class="success-text" id="successText">報名成功！</div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <div class="success-text">📢 注意事項</div>
      <div id="infoContent" class="info-text-left" style="margin-top:10px; font-size:14px; white-space:pre-line;"></div>
      <button class="btn" id="confirmInfoBtn" onclick="confirmInfo()">我已閱讀</button>
    </div>
  </div>

  <div id="alertModal" class="modal">
    <div class="modal-content">
      <div class="success-text" id="alertTitle">提示</div>
      <div class="alert-text" id="alertMessage"></div>
      <button class="btn" onclick="closeAlert()">確定</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyw7KenXXDbiT8-EMT355PN5iwvlIS2RNXPPVOHkOM-m42SpUc2afxNAe2UexsmVHOi/exec";
    const YOUR_LIFF_ID = "2009884041-ANvyV2S7";

    let userId = "";
    let selectedSlots = [];
    let slotsPolling = null;
    let isFirstLoad = true;

    // ===== 工具函式 =====
    const $ = id => document.getElementById(id);
    const slotKey = s => `${s.type}|${s.slot}`;
    const isSelected = s => selectedSlots.some(x => slotKey(x) === slotKey(s));

    function getTypeClass(type) {
      if (type.includes("自潛")) return "slot-free";
      if (type.includes("人魚")) return "slot-mermaid";
      if (type.includes("水舞")) return "slot-dance";
      if (type.includes("水肺")) return "slot-scuba";
      return "";
    }

    function showAlert(message, title = "提示") {
      $("alertTitle").innerText = title;
      $("alertMessage").innerText = message;
      $("alertModal").classList.add("show");
    }

    function closeAlert() {
      $("alertModal").classList.remove("show");
    }

    function showSuccess(message) {
      $("successText").innerText = message || "報名成功!";
      $("successModal").classList.add("show");
      setTimeout(() => {
        if (liff.isInClient()) liff.closeWindow();
        else $("successModal").classList.remove("show");
      }, 2500);
    }

    // ===== 全域錯誤處理 =====
    window.onerror = (msg, url, line) => showAlert(`JS錯誤: ${msg}\nline: ${line}`, "錯誤");
    window.addEventListener("unhandledrejection", e => showAlert(`Promise錯誤: ${e.reason}`, "錯誤"));

    // ===== LIFF 初始化 =====
    async function init() {
      await liff.init({ liffId: YOUR_LIFF_ID });
      const profile = await liff.getProfile();
      userId = profile.userId;
    }

    // ===== 載入資料 =====
    async function loadInformation() {
      const btn = $("confirmInfoBtn");
      try {
        const res = await fetch(`${GAS_URL}?action=getInformation`);
        const data = await res.json();
        $("infoContent").innerText = data.content || "";
        $("equipInfo").innerText = data.equipments || "暫無裝備可租借";
        btn.disabled = false;
        btn.innerText = "我已閱讀";
      } catch (err) {
        console.error(err);
        $("infoContent").innerText = "❌ 載入失敗,請重新整理";
        $("equipInfo").innerText = "❌ 載入失敗";
      }
    }

    function confirmInfo() {
      $("infoModal").classList.remove("show");
    }

    async function loadSlots() {
      const container = $("slots");
      if (isFirstLoad) container.innerHTML = "載入中...";

      try {
        const res = await fetch(`${GAS_URL}?action=getSlots&t=${Date.now()}`);
        const data = await res.json();

        container.innerHTML = "";
        const updatedSelected = [];

        data.forEach(s => {
          const div = document.createElement("div");
          div.className = "card " + getTypeClass(s.type);

          const isFull = s.currentPeople >= s.maxPeople;
          let statusText;
          if (isFull) {
            statusText = `❌ ${s.maxPeople} 人已滿團`;
          } else if (s.currentPeople >= s.triggerPeople) {
            statusText = `✅ 已成團 目前 ${s.currentPeople} 人(再 ${s.maxPeople - s.currentPeople} 人滿團)`;
          } else {
            statusText = `⏳ 未成團 目前 ${s.currentPeople} 人(差 ${s.triggerPeople - s.currentPeople} 人成團)`;
          }

          div.innerHTML = `
            <div class="slot-title">${s.type}</div>
            <div class="slot-info">📍 ${s.location || ""}</div>
            <div class="slot-info">🕒 ${s.slot}</div>
            <div class="slot-info">💰 ${s.price ? s.price + " 元" : ""}</div>
            <div class="slot-status">${statusText}</div>
          `;

          if (isFull) {
            div.style.opacity = "0.5";
            div.style.pointerEvents = "none";
            if (isSelected(s)) showAlert(`「${s.type} / ${s.slot}」已滿團,已從您的選擇中移除`);
          } else if (isSelected(s)) {
            div.classList.add("selected");
            updatedSelected.push(s);
          }

          div.onclick = () => {
            if (isFull) return;
            const idx = selectedSlots.findIndex(x => slotKey(x) === slotKey(s));
            if (idx >= 0) selectedSlots.splice(idx, 1);
            else selectedSlots.push(s);
            div.classList.toggle("selected");
            updateSelectedSummary();
          };

          container.appendChild(div);
        });

        selectedSlots = updatedSelected;
        updateSelectedSummary();
        isFirstLoad = false;
      } catch (err) {
        console.error(err);
        $("slots").innerHTML = "❌ 載入失敗:" + (err.message || err);
      }
    }

    function updateSelectedSummary() {
      const el = $("selectedSummary");
      if (selectedSlots.length === 0) {
        el.style.display = "none";
        return;
      }
      const total = selectedSlots.reduce((sum, s) => sum + (Number(s.price) || 0), 0);
      el.innerHTML = `已選 ${selectedSlots.length} 場 ・ 合計 ${total} 元`;
      el.style.display = "block";
    }

    // ===== Polling =====
    function startPollingSlots() {
      if (!slotsPolling) slotsPolling = setInterval(loadSlots, 5000);
    }

    function stopPollingSlots() {
      clearInterval(slotsPolling);
      slotsPolling = null;
    }

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && slotsPolling) loadSlots();
    });

    // ===== 送出報名 =====
    async function submitBooking() {
      const btn = document.querySelector(".container > .btn");
      btn.disabled = true;
      btn.innerText = "處理中...";
      stopPollingSlots();

      let shouldRestartPolling = true;

      try {
        const fields = {
          name: $("name").value.trim(),
          phone: $("phone").value.trim(),
          license: $("license").value.trim(),
          emergency: $("emergency").value.trim(),
          payment: $("payment").value.trim(),
          invoice: $("invoice").value.trim()
        };

        const labels = {
          name: "姓名", phone: "連絡電話", license: "證照等級",
          emergency: "緊急聯絡人/電話", payment: "付款方式", invoice: "發票/統編"
        };

        const missing = Object.keys(fields).filter(k => !fields[k]).map(k => labels[k]);
        if (missing.length > 0) {
          showAlert("請填寫:" + missing.join("、"));
          return;
        }

        if (selectedSlots.length === 0) {
          showAlert("請至少選擇一個團練場次");
          return;
        }

        const payload = {
          action: "createBooking",
          userId,
          ...fields,
          note: $("note").value.trim(),
          selectedSlots: JSON.stringify(selectedSlots.map(s => ({ type: s.type, slot: s.slot })))
        };

        const url = `${GAS_URL}?${new URLSearchParams(payload)}`;
        const res = await fetch(url);
        const result = await res.json();

        if (result.success) {
          if (result.failedList && result.failedList.length > 0) {
            showAlert(
              `✅ 成功報名 ${result.successCount} 場\n\n❌ 失敗 ${result.failedList.length} 場:\n` +
              result.failedList.join("\n"),
              "報名結果"
            );
            selectedSlots = [];
            loadSlots();
            return;
          }
          shouldRestartPolling = false;
          showSuccess(`成功報名 ${result.successCount} 場！`);
        } else {
          showAlert(result.message || "報名失敗");
          loadSlots();
        }
      } catch (err) {
        console.error(err);
        showAlert("連線失敗:" + err);
      } finally {
        btn.innerText = "確認報名";
        btn.disabled = false;
        if (shouldRestartPolling) startPollingSlots();
      }
    }

    // ===== 啟動 =====
    $("infoModal").classList.add("show");
    $("infoContent").innerText = "載入中...";
    $("confirmInfoBtn").disabled = true;

    init().catch(err => showAlert("LIFF init 失敗: " + err.message, "錯誤"));
    loadInformation();
    loadSlots();
    startPollingSlots();
  </script>

</body>
</html>
