<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我要報名團練</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      animation: pop 0.3s ease;
      max-width: 90%;
    }

    .checkmark {
      font-size: 50px;
      color: #06c755;
      animation: scale 0.4s ease;
    }

    .success-text {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    @keyframes pop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes scale {
      from {
        transform: scale(0);
      }

      to {
        transform: scale(1);
      }
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      background: #f5f6f8;
    }

    .header {
      background: #06c755;
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      border: 2px solid transparent;
    }

    /* 場次卡片預設邊框(中性) */
    #slots .card {
      border: 1px solid #e0e0e0;
    }

    /* 不同 type 的底色(淡色,讓黑字清晰) */
    .slot-free {
      background: rgba(231, 76, 60, 0.12) !important;
    }

    /* 自潛 紅 */
    .slot-mermaid {
      background: rgba(230, 126, 34, 0.12) !important;
    }

    /* 人魚 橙 */
    .slot-dance {
      background: rgba(241, 196, 15, 0.18) !important;
    }

    /* 水舞 黃 */
    .slot-scuba {
      background: rgba(39, 174, 96, 0.12) !important;
    }

    /* 水肺 綠 */

    /* 選中:深色粗邊框,底色保留 type 色 */
    #slots .card.selected {
      border: 3px solid #333 !important;
    }

    .slot-title {
      font-size: 16px;
      font-weight: 600;
    }

    .slot-info {
      font-size: 13px;
      color: #444;
      margin-top: 4px;
    }

    .slot-sub {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #06c755;
      color: white;
      font-size: 16px;
      margin-top: 10px;
    }

    .btn:disabled {
      background: #ccc;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .required {
      color: #e74c3c;
      margin-left: 2px;
    }

    .section-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* 裝備資訊區塊(純顯示,不是選項) */
    .equip-info {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 12px;
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-line;
    }

    .info-text-left {
      text-align: left;
    }

    .alert-text {
      margin: 10px 0 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #333;
    }
  </style>
</head>

<body>

  <div class="header">📅 團練預約</div>

  <div class="container">

    <!-- 場次區塊在最前面 -->
    <div class="card">
      <div class="section-title">團練場次<span class="required">*</span></div>
    </div>

    <div id="slots"></div>

    <div class="card">
      <div class="section-title">姓名/Line ID<span class="required">*</span></div>
      <input id="name" placeholder="請輸入姓名" />
    </div>

    <div class="card">
      <div class="section-title">連絡電話<span class="required">*</span></div>
      <input id="phone" />
    </div>

    <div class="card">
      <div class="section-title">證照等級<span class="required">*</span></div>
      <input id="license" />
    </div>

    <div class="card">
      <div class="section-title">緊急聯絡人/電話<span class="required">*</span></div>
      <input id="emergency" />
    </div>

    <div class="card">
      <div class="section-title">付款方式<span class="required">*</span></div>
      <input id="payment" placeholder="匯款請填後五碼/Linepay則填Linepay" />
    </div>

    <div class="card">
      <div class="section-title">發票/統編<span class="required">*</span></div>
      <input id="invoice" placeholder="不需要請填「無」" />
    </div>

    <!-- 裝備資訊(從 information sheet B 欄動態載入) -->
    <div class="card">
      <div class="section-title">🤿 裝備租借資訊</div>
      <div class="equip-info" id="equipInfo">載入中...</div>
    </div>

    <div class="card">
      <div class="section-title">備註</div>
      <textarea id="note" placeholder="如需租借裝備、特殊需求等請填寫於此"></textarea>
    </div>

    <button class="btn" onclick="submitBooking()">確認報名</button>

  </div>

  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="checkmark">✔</div>
      <div class="success-text">報名成功！</div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <div class="success-text">📢 注意事項</div>
      <div id="infoContent" class="info-text-left" style="margin-top:10px; font-size:14px; white-space:pre-line;"></div>
      <button class="btn" id="confirmInfoBtn" onclick="confirmInfo()">我已閱讀</button>
    </div>
  </div>

  <!-- 自訂提示彈窗(取代 alert) -->
  <div id="alertModal" class="modal">
    <div class="modal-content">
      <div class="success-text" id="alertTitle">提示</div>
      <div class="alert-text" id="alertMessage"></div>
      <button class="btn" onclick="closeAlert()">確定</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyw7KenXXDbiT8-EMT355PN5iwvlIS2RNXPPVOHkOM-m42SpUc2afxNAe2UexsmVHOi/exec";
    const YOUR_LIFF_ID = "2009884041-ANvyV2S7";
    let userId = "";
    let selected = null;
    let slotsPolling = null;
    let isFirstLoad = true;

    // type → CSS class 對應
    function getTypeClass(type) {
      if (type.includes("自潛")) return "slot-free";
      if (type.includes("人魚")) return "slot-mermaid";
      if (type.includes("水舞")) return "slot-dance";
      if (type.includes("水肺")) return "slot-scuba";
      return "";
    }

    // 自訂提示彈窗(取代 alert)
    function showAlert(message, title = "提示") {
      document.getElementById("alertTitle").innerText = title;
      document.getElementById("alertMessage").innerText = message;
      document.getElementById("alertModal").classList.add("show");
    }

    function closeAlert() {
      document.getElementById("alertModal").classList.remove("show");
    }

    window.onerror = function (msg, url, line) {
      showAlert("JS錯誤: " + msg + "\nline: " + line, "錯誤");
    };
    window.addEventListener("unhandledrejection", function (event) {
      showAlert("Promise錯誤: " + event.reason, "錯誤");
    });

    function showSuccess() {
      const modal = document.getElementById("successModal");
      modal.classList.add("show");

      setTimeout(() => {
        if (liff.isInClient()) {
          liff.closeWindow();
        } else {
          modal.classList.remove("show");
        }
      }, 1500);
    }

    // 一次拿注意事項 + 裝備清單
    async function loadInformation() {
      const btn = document.getElementById("confirmInfoBtn");
      try {
        const res = await fetch(`${GAS_URL}?action=getInformation`);
        const data = await res.json();

        document.getElementById("infoContent").innerText = data.content || "";
        btn.disabled = false;
        btn.innerText = "我已閱讀";

        document.getElementById("equipInfo").innerText =
          data.equipments || "暫無裝備可租借";
      } catch (err) {
        console.error(err);
        document.getElementById("infoContent").innerText = "❌ 載入失敗,請重新整理";
        document.getElementById("equipInfo").innerText = "❌ 載入失敗";
      }
    }

    function confirmInfo() {
      document.getElementById("infoModal").classList.remove("show");
    }

    async function init() {
      await liff.init({ liffId: YOUR_LIFF_ID });
      const profile = await liff.getProfile();
      userId = profile.userId;
    }

    async function loadSlots() {
      const container = document.getElementById("slots");

      if (isFirstLoad) {
        container.innerHTML = "載入中...";
      }

      try {
        const res = await fetch(`${GAS_URL}?action=getSlots&t=${Date.now()}`);
        const data = await res.json();

        const selectedKey = selected ? `${selected.type}|${selected.slot}` : null;

        container.innerHTML = "";

        data.forEach((s) => {
          const div = document.createElement("div");
          div.className = "card " + getTypeClass(s.type);

          // 🔥 三種狀態判斷
          let statusHTML = "";
          let isFull = false;

          if (s.currentPeople >= s.maxPeople) {
            // 🔴 已滿團
            statusHTML = `<div class="slot-sub" style="color:#000; font-weight:700;">❌ ${s.maxPeople} 人已滿團</div>`;
            isFull = true;
          } else if (s.currentPeople >= s.triggerPeople) {
            // 🟢 已成團
            const remain = s.maxPeople - s.currentPeople;
            statusHTML = `<div class="slot-sub" style="color:#000; font-weight:700;">✅ 已成團 目前 ${s.currentPeople} 人(還差 ${remain} 滿團)</div>`;
          } else {
            // 🟡 未成團
            const need = s.triggerPeople - s.currentPeople;
            statusHTML = `<div class="slot-sub" style="color:#000; font-weight:700;">⏳ 未成團 目前 ${s.currentPeople} 人(還差 ${need} 人成團)</div>`;
          }

          div.innerHTML = `
    <div class="slot-title">${s.type}</div>
    <div class="slot-info">📍 ${s.location || ""}</div>
    <div class="slot-info">🕒 ${s.slot}</div>
    <div class="slot-info">💰 ${s.price ? s.price + " 元" : ""}</div>
    ${statusHTML}
  `;

          if (isFull) {
            div.style.opacity = "0.5";
            div.style.pointerEvents = "none";
            if (selectedKey === `${s.type}|${s.slot}`) {
              selected = null;
              showAlert("您剛才選的場次已滿團,請重新選擇");
            }
          }

          // 還原選中狀態
          if (selectedKey === `${s.type}|${s.slot}` && !isFull) {
            div.classList.add("selected");
            selected = s;
          }

          div.onclick = () => {
            document.querySelectorAll("#slots .card").forEach(c => c.classList.remove("selected"));
            div.classList.add("selected");
            selected = s;
            console.log("選到:", selected);
          };

          container.appendChild(div);
        });

        isFirstLoad = false;
      } catch (err) {
        console.error(err);
        if (isFirstLoad) {
          document.getElementById("slots").innerHTML = "❌ 載入失敗:" + err.message;
        }
      }
    }

    function startPollingSlots() {
      if (slotsPolling) return;
      slotsPolling = setInterval(loadSlots, 5000);
    }

    function stopPollingSlots() {
      clearInterval(slotsPolling);
      slotsPolling = null;
    }

    // 切回頁面立刻刷新一次
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        loadSlots();
      }
    });

    async function submitBooking() {
      const btn = document.querySelector(".container > .btn");
      btn.disabled = true;
      btn.innerText = "處理中...";

      try {
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const license = document.getElementById("license").value.trim();
        const emergency = document.getElementById("emergency").value.trim();
        const payment = document.getElementById("payment").value;
        const invoice = document.getElementById("invoice").value.trim();
        const note = document.getElementById("note").value.trim();

        const requiredFields = [
          { val: name, label: "姓名" },
          { val: phone, label: "連絡電話" },
          { val: license, label: "證照等級" },
          { val: emergency, label: "緊急聯絡人/電話" },
          { val: payment, label: "付款方式" },
          { val: invoice, label: "發票/統編" }
        ];

        const missing = requiredFields.filter(f => !f.val).map(f => f.label);
        if (missing.length > 0) {
          showAlert("請填寫:" + missing.join("、"));
          return;
        }

        if (!selected) {
          showAlert("請選擇團練場次");
          return;
        }

        const payload = {
          action: "createBooking",
          userId,
          name,
          phone,
          license,
          emergency,
          payment,
          invoice,
          type: selected.type,
          slot: selected.slot,
          note
        };

        const query = new URLSearchParams(payload).toString();
        const url = `${GAS_URL}?${query}`;
        console.log("request url:", url);

        const res = await fetch(url);
        const result = await res.json();
        console.log("result:", result);

        if (result.success) {
          stopPollingSlots();
          showSuccess();
        } else {
          showAlert(result.message || "報名失敗");
          loadSlots();
        }

      } catch (err) {
        console.error(err);
        showAlert("連線失敗:" + err);
      } finally {
        btn.innerText = "確認報名";
        btn.disabled = false;
      }
    }

    // 立刻彈注意事項 modal(瞬間反應)
    document.getElementById("infoModal").classList.add("show");
    document.getElementById("infoContent").innerText = "載入中...";
    document.getElementById("confirmInfoBtn").disabled = true;

    // 並行載入,不互等
    init().catch(err => showAlert("LIFF init 失敗: " + err.message, "錯誤"));
    loadInformation();
    loadSlots();
    startPollingSlots();
  </script>

</body>

</html>
