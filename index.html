<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我要報名團練</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
      animation: pop 0.3s ease;
    }

    .checkmark {
      font-size: 50px;
      color: #06c755;
      animation: scale 0.4s ease;
    }

    .success-text {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    @keyframes pop {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes scale {
      from {
        transform: scale(0);
      }

      to {
        transform: scale(1);
      }
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      background: #f5f6f8;
    }

    .header {
      background: #06c755;
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
    }

    .slot-title {
      font-size: 16px;
      font-weight: 600;
    }

    .slot-sub {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #06c755;
      color: white;
      font-size: 16px;
      margin-top: 10px;
    }

    .btn:disabled {
      background: #ccc;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .selected {
      border: 2px solid #06c755;
    }
  </style>
</head>

<body>

  <div class="header">📅 團練預約</div>

  <div class="container">

    <div class="card">
      <div>姓名/Line ID</div>
      <input id="name" placeholder="請輸入姓名" />
    </div>

    <div class="card">
      <div>連絡電話</div>
      <input id="phone" />
    </div>

    <div class="card">
      <div>證照等級</div>
      <input id="license" />
    </div>

    <div class="card">
      <div>緊急聯絡人/電話</div>
      <input id="emergency" />
    </div>

    <div class="card">
      <div>報名人數</div>
      <input id="people" type="number" value="1" />
    </div>

    <div id="slots"></div>

    <button class="btn" onclick="submitBooking()">確認報名</button>

  </div>

  <div id="successModal" class="modal">
    <div class="modal-content">
      <div class="checkmark">✔</div>
      <div class="success-text">報名成功！</div>
    </div>
  </div>

  <div id="infoModal" class="modal">
    <div class="modal-content">
      <div class="success-text">📢 注意事項</div>
      <div id="infoContent" style="margin-top:10px; font-size:14px; white-space:pre-line;"></div>
      <button class="btn" id="confirmInfoBtn" onclick="confirmInfo()">我已閱讀</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyw7KenXXDbiT8-EMT355PN5iwvlIS2RNXPPVOHkOM-m42SpUc2afxNAe2UexsmVHOi/exec";
    const YOUR_LIFF_ID = "2009884041-ANvyV2S7";
    let userId = "";
    let selected = null;

    window.onerror = function (msg, url, line) {
      alert("JS錯誤: " + msg + "\nline: " + line);
    };
    window.addEventListener("unhandledrejection", function (event) {
      alert("Promise錯誤: " + event.reason);
    });

    function showSuccess() {
      const modal = document.getElementById("successModal");
      modal.classList.add("show");

      setTimeout(() => {
        if (liff.isInClient()) {
          liff.closeWindow();
        } else {
          modal.classList.remove("show");
        }
      }, 1500);
    }

    async function loadInformation() {
      const btn = document.getElementById("confirmInfoBtn");
      try {
        const res = await fetch(`${GAS_URL}?action=getInformation`);
        const data = await res.json();
        document.getElementById("infoContent").innerText = data.content;
        btn.disabled = false;
        btn.innerText = "我已閱讀";
      } catch (err) {
        console.error(err);
        document.getElementById("infoContent").innerText = "❌ 載入失敗,請重新整理";
      }
    }

    function confirmInfo() {
      document.getElementById("infoModal").classList.remove("show");
    }

    async function init() {
      await liff.init({ liffId: YOUR_LIFF_ID });
      const profile = await liff.getProfile();
      userId = profile.userId;
    }

    async function loadSlots() {
      const container = document.getElementById("slots");
      container.innerHTML = "載入中...";

      try {
        const res = await fetch(`${GAS_URL}?action=getSlots`);
        const data = await res.json();

        container.innerHTML = "";

        data.forEach((s, idx) => {
          const div = document.createElement("div");
          div.className = "card";

          const remaining = s.maxPeople - s.currentPeople;
          let statusText = remaining > 0 ? `剩餘：${remaining} 人` : `❌ 已額滿`;

          div.innerHTML = `
            <div class="slot-title">${s.type} - ${s.slot}</div>
            <div class="slot-sub">${statusText}</div>
          `;

          if (remaining <= 0) {
            div.style.opacity = "0.5";
            div.style.pointerEvents = "none";
          }

          div.onclick = () => {
            document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));
            div.classList.add("selected");
            selected = s;
            console.log("選到:", selected);
          };

          container.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        document.getElementById("slots").innerHTML = "❌ 載入失敗";
      }
    }

    async function submitBooking() {
      const btn = document.querySelector(".container > .btn");
      btn.disabled = true;
      btn.innerText = "處理中...";

      try {
        const name = document.getElementById("name").value;
        const phone = document.getElementById("phone").value;
        const license = document.getElementById("license").value;
        const emergency = document.getElementById("emergency").value;
        const people = Number(document.getElementById("people").value);

        if (!selected) {
          alert("請選擇團練場次");
          return;
        }

        const payload = {
          action: "createBooking",
          userId,
          name,
          phone,
          license,
          emergency,
          type: selected.type,
          slot: selected.slot,
          people
        };

        const query = new URLSearchParams(payload).toString();
        const url = `${GAS_URL}?${query}`;
        console.log("request url:", url);

        const res = await fetch(url);
        const result = await res.json();
        console.log("result:", result);

        if (result.success) {
          showSuccess();
        } else {
          alert(result.message || "報名失敗");
        }

      } catch (err) {
        console.error(err);
        alert("連線失敗：" + err);
      } finally {
        btn.innerText = "確認報名";
        btn.disabled = false;
      }
    }

    // 👇 頁面一開就立刻彈 modal(瞬間反應)
    document.getElementById("infoModal").classList.add("show");
    document.getElementById("infoContent").innerText = "載入中...";
    document.getElementById("confirmInfoBtn").disabled = true;

    // 👇 三件事同時跑(並行,不互等)
    init().catch(err => alert("LIFF init 失敗: " + err.message));
    loadInformation();
    loadSlots();
  </script>

</body>

</html>
